; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env]
framework = arduino
monitor_speed = 115200
;monitor_speed = 2000000
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
upload_port = COM3
monitor_port = COM3
build_flags = 
    -D BOARD_NODEMCU       ; definisce BOARD_NODEMCU solo per questo env
    -D HAS_MPU6050         ; questo board ha MPU6050
lib_deps =
    SPI
    Wire
    adafruit/Adafruit MPU6050@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.9

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
build_flags =
    -D BOARD_HELTEC        ; definisce BOARD_HELTEC solo per questo env
    -D HAS_LSM6DS3
    -D HAS_OLED
; --- 2. SERIAL ROUTING ---
; Force logs to the same USB-UART port used for upload (/dev/ttyUSB0).
; If you later switch to native USB monitor (e.g. /dev/ttyACM*),
; re-enable ARDUINO_USB_MODE / ARDUINO_USB_CDC_ON_BOOT flags.
    -ARDUINO_USB_MODE=1
    -ARDUINO_USB_CDC_ON_BOOT=1
; --- 1. MEMORY PARTITION FOR TINYML ---
; The default partition is too small for Edge Impulse models.
; 'huge_app.csv' gives you ~3MB of space for your code and ML model.
board_build.partitions = huge_app.csv
; ---  LIBRARY DEPENDENCIES ---
; PlatformIO will automatically download these when you build.
lib_deps = 
    SPI
    Wire
    sparkfun/SparkFun LSM6DS3 Breakout@^1.0.3
    adafruit/Adafruit SSD1306@^2.5.13
    ;adafruit/Adafruit LSM6DS@^4.7.0
    ;adafruit/Adafruit Unified Sensor@^1.1.9
    ; jgromes/RadioLib@^6.3.0  <-- We will uncomment this later for LoRa